<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Logo Fam Của Minh A</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #f7f8fc, #eef1f8);
        font-family: Inter, Arial, sans-serif;
      }

      .logo-wrap {
        width: min(92vw, 560px);
        text-align: center;
      }

      .logo-wrap img {
        width: 100%;
        height: auto;
        display: block;
      }

      .logo-wrap p {
        margin-top: 16px;
        color: #1a237e;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="logo-wrap">
      <img src="assets/fam-logo.svg" alt="Logo FAM CỦA MINH A" />
      <p>Logo FAM CỦA MINH A</p>
    </div>
  </body>
</html>
