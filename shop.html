<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đang chuyển hướng tới Shop | Fam của Minh A</title>
    <meta name="robots" content="noindex" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        background: #070b14;
        color: #e6edf9;
      }

      .wrap {
        text-align: center;
        padding: 24px;
      }

      a {
        color: #3ad0ff;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1>Đang mở Shop...</h1>
      <p>Nếu chưa tự chuyển hướng, hãy bấm vào liên kết bên dưới.</p>
      <p><a id="shop-link" href="https://shop.famcuaminha.indevs.in">Vào Shop</a></p>
    </main>

    <script>
      const shopBaseUrl = 'https://shop.famcuaminha.indevs.in';
      const currentUrl = new URL(window.location.href);
      const product = currentUrl.searchParams.get('product');

      const destination = new URL(shopBaseUrl);
      if (product) {
        destination.searchParams.set('product', product);
      }

      const link = document.querySelector('#shop-link');
      link.href = destination.toString();

      window.location.replace(destination.toString());
    </script>
  </body>
</html>
